<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Generator — The Practical AI Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0B1220; --navy-mid: #0F1B33; --navy-light: #162040;
      --teal: #14B8A6; --cyan: #0EA5E9; --orange: #F97316;
      --white: #F8FAFC; --muted: #8899B0; --border: rgba(255,255,255,0.07);
      --grad: linear-gradient(135deg, #14B8A6, #0EA5E9);
      --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--navy); color: var(--white); min-height: 100vh; padding: 40px 24px; -webkit-font-smoothing: antialiased; }
    .container { max-width: 900px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 48px; }
    .header-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(20,184,166,0.1); border: 1px solid rgba(20,184,166,0.25); color: var(--teal); font-size: 0.8rem; font-weight: 600; padding: 5px 12px; border-radius: 100px; margin-bottom: 20px; letter-spacing: 0.05em; text-transform: uppercase; }
    h1 { font-family: var(--font-head); font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; letter-spacing: -0.03em; margin-bottom: 12px; }
    .grad-text { background: linear-gradient(90deg, #14B8A6, #0EA5E9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .header p { color: var(--muted); font-size: 0.95rem; }

    /* FORM */
    .form-card { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin-bottom: 32px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .form-full { grid-column: 1 / -1; }
    label { display: block; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--teal); margin-bottom: 8px; }
    input, select, textarea {
      width: 100%; background: var(--navy-light); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; color: var(--white); font-family: var(--font-body); font-size: 0.9rem; outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--teal); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    select option { background: var(--navy-mid); }
    textarea { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px;
      border-radius: 10px; font-family: var(--font-head); font-weight: 700; font-size: 0.95rem;
      cursor: pointer; border: none; transition: all 0.2s; width: 100%; justify-content: center;
    }
    .btn-primary { background: var(--grad); color: var(--navy); }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(20,184,166,0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* LOADING */
    .loading { display: none; text-align: center; padding: 40px; }
    .loading.active { display: block; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--muted); font-size: 0.9rem; }

    /* RESULTS */
    .results { display: none; }
    .results.active { display: block; }
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .results-header h2 { font-family: var(--font-head); font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; }
    .btn-sm { padding: 8px 18px; font-size: 0.85rem; width: auto; }
    .btn-ghost { background: transparent; color: var(--white); border: 1px solid var(--border); }
    .btn-ghost:hover { background: rgba(255,255,255,0.06); }

    /* CONTENT TABS */
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab { padding: 8px 18px; border-radius: 8px; font-family: var(--font-head); font-weight: 600; font-size: 0.85rem; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.2s; }
    .tab.active { background: var(--grad); color: var(--navy); border-color: transparent; }
    .tab:hover:not(.active) { border-color: var(--teal); color: var(--white); }

    /* CONTENT PANELS */
    .panel { display: none; }
    .panel.active { display: flex; flex-direction: column; gap: 16px; }

    .content-card { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .content-card-header { background: var(--navy-light); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .content-label { font-family: var(--font-head); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teal); }
    .copy-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-family: var(--font-body); transition: all 0.2s; }
    .copy-btn:hover { border-color: var(--teal); color: var(--teal); }
    .copy-btn.copied { border-color: var(--teal); color: var(--teal); }
    .content-body { padding: 20px; font-size: 0.88rem; line-height: 1.7; color: #CBD5E1; white-space: pre-wrap; }

    /* WEEK OVERVIEW */
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 24px; }
    .day-chip { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 8px; padding: 10px 8px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .day-chip.active { border-color: var(--teal); background: rgba(20,184,166,0.1); }
    .day-chip:hover:not(.active) { border-color: rgba(255,255,255,0.2); }
    .day-name { font-family: var(--font-head); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 4px; }
    .day-platform { font-size: 1.1rem; }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .week-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-badge">⚡ Content Generator</div>
    <h1>Weekly Content<br><span class="grad-text">Engine</span></h1>
    <p>One session. A full week of TikTok & YouTube content — scripts, hooks, captions, CTAs.</p>
  </div>

  <div class="form-card">
    <div class="form-grid">
      <div>
        <label>Topic / AI Tool This Week</label>
        <input type="text" id="topic" placeholder="e.g. ChatGPT for writing emails" />
      </div>
      <div>
        <label>Product to Promote</label>
        <select id="product">
          <option value="">Select a product...</option>
          <option value="free">Free Beginners Guide (lead magnet)</option>
          <option value="openclaw">Open Claw Setup Pack — A$49.99</option>
          <option value="fundamentals">AI Fundamentals & Practical Tools — A$79.00</option>
          <option value="privacy">Privacy & Safe Use at Work — A$24.99</option>
          <option value="research">Research Aid — A$9.99</option>
          <option value="meeting">Meeting Notes — A$9.99</option>
          <option value="email">Email Help Pack — A$9.99</option>
          <option value="prompts">Practical Prompt Templates — A$4.99</option>
          <option value="automation">Start Here: Automation — A$5.00</option>
          <option value="writing">Start Here: Writing & Editing — A$5.00</option>
          <option value="chatbots">Start Here: Chatbots — A$5.00</option>
        </select>
      </div>
      <div>
        <label>Content Angle</label>
        <select id="angle">
          <option value="fear">Fear of missing out / job security</option>
          <option value="quick-win">Quick win / time saving tip</option>
          <option value="myth">Bust a myth about AI</option>
          <option value="howto">Step-by-step how-to</option>
          <option value="comparison">Before AI vs After AI</option>
          <option value="story">Story / case study</option>
        </select>
      </div>
      <div>
        <label>Tone</label>
        <select id="tone">
          <option value="direct">Direct & no-nonsense</option>
          <option value="friendly">Friendly & approachable</option>
          <option value="urgent">Urgent & motivating</option>
          <option value="educational">Clear & educational</option>
        </select>
      </div>
      <div class="form-full">
        <label>Extra context (optional)</label>
        <textarea id="context" placeholder="e.g. focus on managers, mention the tool is free to start, target finance professionals..."></textarea>
      </div>
    </div>
    <button class="btn btn-primary" id="generateBtn" onclick="generateContent()">
      ⚡ Generate This Week's Content
    </button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Generating your week of content...</p>
  </div>

  <div class="results" id="results">
    <div class="results-header">
      <h2>Your Week of Content</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="copyAll()">Copy All</button>
        <button class="btn btn-ghost btn-sm" onclick="resetForm()">← New Week</button>
      </div>
    </div>

    <div class="week-grid" id="weekGrid"></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('tiktok', this)">📱 TikTok (7 scripts)</button>
      <button class="tab" onclick="switchTab('youtube', this)">▶️ YouTube (2 scripts)</button>
      <button class="tab" onclick="switchTab('captions', this)">✏️ Captions</button>
      <button class="tab" onclick="switchTab('ctas', this)">🎯 CTAs</button>
    </div>

    <div class="panel active" id="panel-tiktok"></div>
    <div class="panel" id="panel-youtube"></div>
    <div class="panel" id="panel-captions"></div>
    <div class="panel" id="panel-ctas"></div>
  </div>

</div>

<script>
const PRODUCTS = {
  free: { name: "Free Beginners Guide", url: "https://payhip.com/b/7sNzw", cta: "Download our free AI Beginners Guide — link in bio" },
  openclaw: { name: "Open Claw Setup Pack", url: "https://payhip.com/b/xoBDP", cta: "Get the OpenClaw Setup Pack at practicalaico.ai" },
  fundamentals: { name: "AI Fundamentals & Practical Tools", url: "https://payhip.com/PracticalAICo", cta: "Grab AI Fundamentals & Practical Tools at practicalaico.ai" },
  privacy: { name: "Privacy & Safe Use at Work", url: "https://payhip.com/PracticalAICo", cta: "Get the Privacy & Safe Use at Work guide at practicalaico.ai" },
  research: { name: "Research Aid", url: "https://payhip.com/PracticalAICo", cta: "Check out the Research Aid guide at practicalaico.ai" },
  meeting: { name: "Meeting Notes Guide", url: "https://payhip.com/PracticalAICo", cta: "Get the Meeting Notes guide at practicalaico.ai" },
  email: { name: "Email Help Pack", url: "https://payhip.com/PracticalAICo", cta: "Grab the Email Help Pack at practicalaico.ai" },
  prompts: { name: "Practical Prompt Templates", url: "https://payhip.com/PracticalAICo", cta: "Get the Prompt Templates pack at practicalaico.ai" },
  automation: { name: "Start Here: Automation", url: "https://payhip.com/PracticalAICo", cta: "Start Here: Automation guide at practicalaico.ai — only A$5" },
  writing: { name: "Start Here: Writing & Editing", url: "https://payhip.com/PracticalAICo", cta: "Start Here: Writing & Editing guide at practicalaico.ai — only A$5" },
  chatbots: { name: "Start Here: Chatbots", url: "https://payhip.com/PracticalAICo", cta: "Start Here: Chatbots guide at practicalaico.ai — only A$5" },
};

const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAY_PLATFORMS = ['📱','📱','📱','▶️','📱','📱','▶️'];

let generatedContent = null;

async function generateContent() {
  const topic = document.getElementById('topic').value.trim();
  const productKey = document.getElementById('product').value;
  const angle = document.getElementById('angle').value;
  const tone = document.getElementById('tone').value;
  const context = document.getElementById('context').value.trim();

  if (!topic) { alert('Please enter a topic first.'); return; }
  if (!productKey) { alert('Please select a product to promote.'); return; }

  const product = PRODUCTS[productKey];
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;

  document.getElementById('loading').classList.add('active');
  document.getElementById('results').classList.remove('active');

  const angleDescriptions = {
    'fear': 'job security / fear of being left behind by AI — make the viewer feel urgency about learning AI',
    'quick-win': 'a quick win or time-saving tip that shows immediate value',
    'myth': 'bust a common myth or misconception about AI',
    'howto': 'a clear step-by-step how-to guide',
    'comparison': 'before AI vs after AI — show the transformation',
    'story': 'a relatable story or case study about a desk worker using AI'
  };

  const toneDescriptions = {
    'direct': 'direct, no-nonsense, gets to the point fast',
    'friendly': 'friendly, warm, and approachable like a knowledgeable colleague',
    'urgent': 'urgent and motivating — creates a sense of FOMO and action',
    'educational': 'clear, calm, and educational like a trusted teacher'
  };

  const prompt = `You are a social media content creator for "The Practical AI Co." — a brand that teaches white-collar office workers aged 30+ how to use AI tools at work so they don't lose their jobs to AI. The brand voice is: ${toneDescriptions[tone]}. No jargon, no hype, plain English.

TOPIC THIS WEEK: ${topic}
PRODUCT TO PROMOTE: ${product.name} — ${product.cta}
CONTENT ANGLE: ${angleDescriptions[angle]}
${context ? `EXTRA CONTEXT: ${context}` : ''}

Generate a complete week of social media content. Return ONLY a valid JSON object in this exact format:

{
  "tiktok": [
    {
      "day": "Monday",
      "hook": "First 3 seconds — the scroll-stopping opening line (under 10 words, punchy)",
      "script": "Full TikTok script (60-90 seconds when read aloud). Structure: HOOK (3 sec) → PROBLEM (10 sec) → SOLUTION/VALUE (30-40 sec) → CTA (10 sec). Written as spoken word for AI avatar voiceover. No scene directions.",
      "caption": "TikTok caption with hook, value, and CTA. Include 3-5 relevant hashtags.",
      "cta_line": "The exact CTA line to say at end of video"
    }
  ],
  "youtube": [
    {
      "day": "Thursday",
      "title": "YouTube video title (SEO optimised, under 60 chars)",
      "description": "YouTube description (150 words). Include keywords naturally. End with CTA link.",
      "script": "Full YouTube script (3-5 minutes when read aloud). Structure: HOOK (30 sec) → INTRO (30 sec) → MAIN CONTENT with 3-4 clear sections → RECAP → CTA. Written for AI avatar voiceover.",
      "thumbnail_text": "3-5 words for thumbnail text overlay"
    },
    {
      "day": "Sunday",
      "title": "YouTube video title",
      "description": "YouTube description",
      "script": "Full YouTube script",
      "thumbnail_text": "Thumbnail text"
    }
  ],
  "hashtag_sets": {
    "tiktok": ["#AIAtWork", "#WorkSmarter", "#AITools", "#OfficeLife", "#CareerTips"],
    "youtube": ["AIForWork", "AITools2026", "WorkSmarter"]
  }
}

Make all 7 TikTok scripts cover different angles/sub-topics within the main topic. Make the content genuinely useful and specific — not generic. Each script should feel like it stands alone.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: "You are a social media content expert. Return ONLY valid JSON, no markdown, no backticks, no explanation.",
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content[0].text.trim().replace(/```json|```/g, '');
    generatedContent = JSON.parse(text);
    renderResults(generatedContent, topic, product);
  } catch (err) {
    console.error(err);
    // Fallback demo content if API fails
    generatedContent = generateFallback(topic, product, angle, tone);
    renderResults(generatedContent, topic, product);
  } finally {
    document.getElementById('loading').classList.remove('active');
    btn.disabled = false;
  }
}

function generateFallback(topic, product, angle, tone) {
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const tiktok = days.map((day, i) => ({
    day,
    hook: `Most people don't know this about ${topic}...`,
    script: `[HOOK]\nMost people don't know this about ${topic} — and it's costing them hours every week.\n\n[PROBLEM]\nIf you're still doing this manually in ${new Date().getFullYear()}, you're working harder than you need to.\n\n[VALUE]\nHere's how to use ${topic} at work in 3 simple steps:\nStep 1 — Open the tool and describe your task in plain English.\nStep 2 — Review the output and tweak as needed.\nStep 3 — Use the saved time on higher-value work.\n\n[CTA]\n${product.cta}`,
    caption: `Most people don't know this about ${topic} 👇\n\nHere's how desk workers are using it to save hours every week — no tech skills needed.\n\n${product.cta}\n\n#AIAtWork #WorkSmarter #AITools #OfficeLife #CareerTips`,
    cta_line: product.cta
  }));

  const youtube = [
    {
      day: 'Thursday',
      title: `How to Use ${topic} at Work (Step-by-Step)`,
      description: `In this video, I walk you through exactly how to use ${topic} at work — even if you've never used AI before.\n\nNo jargon. No fluff. Just practical steps you can use today.\n\n${product.cta}\nVisit practicalaico.ai for more guides and resources.`,
      script: `[HOOK - 30 sec]\nIf you're spending hours on tasks that AI could handle in minutes, this video is for you.\n\n[INTRO]\nHi, I'm from The Practical AI Co. — we help desk workers like you use AI tools confidently at work.\n\nToday we're covering ${topic}.\n\n[SECTION 1: What it actually is]\n${topic} isn't complicated. Here's what it actually does...\n\n[SECTION 2: How to use it at work]\nHere's the exact process I recommend...\n\n[SECTION 3: Common mistakes]\nAvoid these mistakes that most beginners make...\n\n[SECTION 4: Quick wins]\nStart with these three tasks this week...\n\n[RECAP]\nSo to recap — ${topic} can save you time on X, Y, and Z.\n\n[CTA]\n${product.cta}. Link is in the description.`,
      thumbnail_text: `${topic} at Work`
    },
    {
      day: 'Sunday',
      title: `${topic}: What Nobody Tells You`,
      description: `Everyone talks about ${topic}, but nobody tells you how it actually works for normal office workers.\n\nIn this video I break it down simply.\n\n${product.cta}\nVisit practicalaico.ai for more.`,
      script: `[HOOK]\nEveryone's talking about ${topic}. But most of the advice out there is for developers and tech people — not for normal desk workers like you and me.\n\nSo today I'm going to tell you what nobody else is saying.\n\n[MAIN CONTENT]\nHere's the reality of using ${topic} at work...\n\n[PRACTICAL TIPS]\nThree things I wish someone had told me when I started...\n\n[CTA]\n${product.cta}`,
      thumbnail_text: `What They Don't Tell You`
    }
  ];

  return { tiktok, youtube, hashtag_sets: { tiktok: ['#AIAtWork','#WorkSmarter','#AITools','#OfficeLife','#CareerTips'], youtube: ['AIForWork','AITools2026','WorkSmarter'] } };
}

function renderResults(content, topic, product) {
  // Week grid
  const weekGrid = document.getElementById('weekGrid');
  weekGrid.innerHTML = DAYS.map((day, i) => `
    <div class="day-chip ${i === 0 ? 'active' : ''}">
      <span class="day-name">${day}</span>
      <span class="day-platform">${DAY_PLATFORMS[i]}</span>
    </div>
  `).join('');

  // TikTok panel
  const tiktokPanel = document.getElementById('panel-tiktok');
  tiktokPanel.innerHTML = content.tiktok.map((item, i) => `
    <div class="content-card">
      <div class="content-card-header">
        <span class="content-label">📱 ${item.day} — TikTok Script ${i+1}</span>
        <button class="copy-btn" onclick="copyCard(this, ${i}, 'tiktok')">Copy</button>
      </div>
      <div class="content-body">🎣 HOOK: ${item.hook}

${item.script}

---
📝 CAPTION:
${item.caption}

🎯 END CTA: ${item.cta_line}</div>
    </div>
  `).join('');

  // YouTube panel
  const ytPanel = document.getElementById('panel-youtube');
  ytPanel.innerHTML = content.youtube.map((item, i) => `
    <div class="content-card">
      <div class="content-card-header">
        <span class="content-label">▶️ ${item.day} — YouTube Script ${i+1}</span>
        <button class="copy-btn" onclick="copyCard(this, ${i}, 'youtube')">Copy</button>
      </div>
      <div class="content-body">📌 TITLE: ${item.title}

🖼 THUMBNAIL TEXT: ${item.thumbnail_text}

📝 DESCRIPTION:
${item.description}

🎬 SCRIPT:
${item.script}</div>
    </div>
  `).join('');

  // Captions panel
  const captionsPanel = document.getElementById('panel-captions');
  captionsPanel.innerHTML = content.tiktok.map((item, i) => `
    <div class="content-card">
      <div class="content-card-header">
        <span class="content-label">✏️ ${item.day} Caption</span>
        <button class="copy-btn" onclick="copyText(this, \`${item.caption.replace(/`/g, '\\`')}\`)">Copy</button>
      </div>
      <div class="content-body">${item.caption}</div>
    </div>
  `).join('');

  // CTAs panel
  const ctaPanel = document.getElementById('panel-ctas');
  const allCtas = [
    ...content.tiktok.map(t => ({ day: t.day, platform: 'TikTok', cta: t.cta_line })),
    ...content.youtube.map(y => ({ day: y.day, platform: 'YouTube', cta: `${product.cta}\n\nLink: ${product.url}` }))
  ];
  ctaPanel.innerHTML = allCtas.map(item => `
    <div class="content-card">
      <div class="content-card-header">
        <span class="content-label">🎯 ${item.day} — ${item.platform}</span>
        <button class="copy-btn" onclick="copyText(this, \`${item.cta.replace(/`/g, '\\`')}\`)">Copy</button>
      </div>
      <div class="content-body">${item.cta}</div>
    </div>
  `).join('');

  document.getElementById('results').classList.add('active');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function switchTab(tabId, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + tabId).classList.add('active');
}

function copyCard(btn, index, type) {
  const body = btn.closest('.content-card').querySelector('.content-body').textContent;
  navigator.clipboard.writeText(body).then(() => {
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAll() {
  if (!generatedContent) return;
  const allText = [
    '=== TIKTOK SCRIPTS ===\n',
    ...generatedContent.tiktok.map(t => `--- ${t.day} ---\nHOOK: ${t.hook}\n\n${t.script}\n\nCAPTION:\n${t.caption}\n`),
    '\n=== YOUTUBE SCRIPTS ===\n',
    ...generatedContent.youtube.map(y => `--- ${y.day} ---\nTITLE: ${y.title}\nTHUMBNAIL: ${y.thumbnail_text}\n\nDESCRIPTION:\n${y.description}\n\nSCRIPT:\n${y.script}\n`)
  ].join('\n');

  navigator.clipboard.writeText(allText).then(() => {
    const btn = event.target;
    btn.textContent = '✓ All Copied!';
    setTimeout(() => { btn.textContent = 'Copy All'; }, 2500);
  });
}

function resetForm() {
  document.getElementById('results').classList.remove('active');
  document.getElementById('topic').value = '';
  document.getElementById('context').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
