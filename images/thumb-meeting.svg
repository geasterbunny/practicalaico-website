  </defs>
  <!-- Background -->
  <rect width="400" height="280" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.05" stroke="#0EA5E9" stroke-width="0.6">
    <line x1="0" y1="70" x2="400" y2="70"/>
    <line x1="0" y1="140" x2="400" y2="140"/>
    <line x1="0" y1="210" x2="400" y2="210"/>
    <line x1="100" y1="0" x2="100" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
  </g>
  <!-- Glow blobs -->
  <ellipse cx="320" cy="80" rx="130" ry="90" fill="rgba(14,165,233,0.08)"/>
  <ellipse cx="80" cy="220" rx="100" ry="70" fill="rgba(20,184,166,0.06)"/>
  <!-- Left accent bar -->
