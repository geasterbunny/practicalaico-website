  <g transform="translate(250, 50)">
    <rect x="8" y="8" width="120" height="155" rx="5" fill="rgba(20,184,166,0.12)"/>
    <rect x="4" y="4" width="120" height="155" rx="5" fill="rgba(14,165,233,0.1)"/>
    <rect x="0" y="0" width="120" height="155" rx="5" fill="#F8FAFC"/>
    <rect x="0" y="0" width="120" height="22" rx="5" fill="#0B1628"/>
    <rect x="0" y="17" width="120" height="5" fill="#0B1628"/>
    <rect x="0" y="19" width="120" height="3" fill="#0EA5E9" opacity="0.8"/>
    <text x="60" y="14" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">PRACTICAL AI CO.</text>
    <rect x="10" y="30" width="100" height="5" rx="2" fill="#E2E8F0"/>
    <rect x="10" y="40" width="80" height="5" rx="2" fill="#E2E8F0"/>
    <rect x="10" y="54" width="100" height="28" rx="4" fill="#F0FDF4" stroke="#14B8A6" stroke-width="0.8"/>
    <rect x="10" y="54" width="3" height="28" rx="2" fill="#14B8A6"/>
    <rect x="17" y="61" width="70" height="4" rx="2" fill="#CCFBF1"/>
    <rect x="17" y="70" width="55" height="4" rx="2" fill="#CCFBF1"/>
    <rect x="10" y="90" width="100" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="10" y="100" width="85" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="10" y="110" width="95" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="10" y="120" width="70" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="10" y="134" width="100" height="18" rx="3" fill="#0F172A"/>
    <text x="60" y="146" font-family="'Courier New',monospace" font-size="7" fill="#14B8A6" text-anchor="middle">copy-paste ready</text>
