  <text x="63" y="206" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="800" fill="#14B8A6" text-anchor="middle">A$5.00</text>
  <!-- Brand footer -->
  <rect x="0" y="258" width="400" height="22" fill="rgba(0,0,0,0.25)"/>
  <text x="18" y="273" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)">The Practical AI Co.</text>
  <text x="382" y="273" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="end">practicalaico.ai</text>
